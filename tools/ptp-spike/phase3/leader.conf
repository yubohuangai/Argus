; ptpd2 leader (master) config for RecSync Wi-Fi hotspot spike.
;
; Adjust ptpengine:interface to whatever the hotspot interface is on
; your Pixel 7 (typically "wlan1" when the device acts as hotspot host;
; verify with `ip -o link show` from Phase 1).

[ptpengine]
interface = wlan1
preset = masteronly
ip_mode = multicast
transport = ipv4
delay_mechanism = E2E
domain = 0
priority1 = 64
priority2 = 64
clock_class = 128
ptp_clock_accuracy = ACC_25us
sync_interval = -3
announce_interval = 0
announce_receipt_timeout = 3
delayreq_interval = -3
log_announce_messages = N

[clock]
no_adjust = Y
no_reset = Y
drift_handling = preserve

[global]
log_file = /data/local/tmp/ptpd-leader.event.log
statistics_file = /data/local/tmp/ptpd-leader.stats.log
status_file = /data/local/tmp/ptpd-leader.status
log_status = Y
