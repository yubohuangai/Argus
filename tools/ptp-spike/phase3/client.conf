; ptpd2 client (slave-only) config for RecSync Wi-Fi hotspot spike.
;
; clock:no_adjust=Y means ptpd OBSERVES and reports offset/delay but
; never touches the system clock. That is what we want for a non-
; intrusive A/B measurement; integration would later flip this off.

[ptpengine]
interface = wlan0
preset = slaveonly
ip_mode = multicast
transport = ipv4
delay_mechanism = E2E
domain = 0
sync_interval = -3
announce_interval = 0
announce_receipt_timeout = 3
delayreq_interval = -3
log_announce_messages = N

[clock]
no_adjust = Y
no_reset = Y

[global]
log_file = /data/local/tmp/ptpd-client.event.log
statistics_file = /data/local/tmp/ptpd-client.stats.log
status_file = /data/local/tmp/ptpd-client.status
log_status = Y
